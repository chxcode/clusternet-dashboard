apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clusternet-dashboard.fullname" . }}
  labels:
    {{- include "clusternet-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "clusternet-dashboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "clusternet-dashboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "clusternet-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: BASE_PATH
              value: {{ include "clusternet-dashboard.basePath" . | quote }}
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: {{ printf "%s/api/health" (include "clusternet-dashboard.basePath" . | trimSuffix "/") | quote }}
              port: http
          readinessProbe:
            httpGet:
              path: {{ printf "%s/api/health" (include "clusternet-dashboard.basePath" . | trimSuffix "/") | quote }}
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

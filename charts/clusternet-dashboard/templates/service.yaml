apiVersion: v1
kind: Service
metadata:
  name: {{ include "clusternet-dashboard.fullname" . }}
  labels:
    {{- include "clusternet-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "clusternet-dashboard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
